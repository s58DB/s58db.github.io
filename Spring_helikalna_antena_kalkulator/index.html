<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spring Antenna Calculator - SVG verzija</title>
<style>
:root {
  --blue:#0757d6; --blue2:#3374A9; --bg:#f6f8fb; --card:#ffffff;
  --line:#d7dde8; --text:#17202a; --muted:#637083; --warn:#fff5d9;
}
* { box-sizing:border-box; }
body {
  margin:0; background:var(--bg); color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
}
.app { max-width:1250px; margin:auto; padding:22px; }
h1 { margin:0; font-size:34px; }
.subtitle { color:var(--blue); font-size:21px; margin-top:4px; }
.grid { display:grid; grid-template-columns:360px 1fr; gap:16px; margin-top:18px; }
.card {
  background:var(--card); border:1px solid var(--line); border-radius:10px;
  padding:18px; box-shadow:0 1px 4px #00000012;
}
.title { color:var(--blue); font-weight:800; font-size:20px; margin-bottom:16px; }
.row { display:grid; grid-template-columns:1fr 130px; gap:12px; align-items:center; margin:14px 0; }
label { font-size:16px; }
small { display:block; color:var(--muted); margin-top:3px; }
input,select {
  width:100%; padding:10px; border:1px solid var(--line); border-radius:7px; font-size:16px;
}
button {
  width:100%; padding:13px; margin-top:16px; border:0; border-radius:7px;
  background:linear-gradient(#0964e8,#064bb9); color:white; font-size:18px; font-weight:800;
}
.warning {
  margin-top:16px; background:var(--warn); border:1px solid #ebc86f; border-left:5px solid #d28a00;
  border-radius:8px; padding:16px; line-height:1.45;
}
.svgbox svg { width:100%; height:auto; display:block; max-height:620px; }
.results { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:16px; }
.result { border:1px solid var(--line); border-radius:8px; padding:12px; background:#fff; }
.result b { display:block; color:var(--muted); font-size:13px; margin-bottom:6px; }
.result span { font-size:22px; font-weight:800; }
@media(max-width:900px) { .grid { grid-template-columns:1fr; } .results { grid-template-columns:1fr 1fr; } }
</style>
</head>
<body>
<div class="app">
  <h1>SPRING ANTENNA CALCULATOR</h1>
  <div class="subtitle">Dinamična SVG skica iz CorelDRAW</div>

  <div class="grid">
    <div>
      <div class="card">
        <div class="title">VHODNI PARAMETRI</div>

        <div class="row"><label>Frekvenca<small>[MHz]</small></label><input id="freq" type="number" step="0.001" value="433.775"></div>
        <div class="row"><label>Premer prostora / luknje<small>[mm]</small></label><input id="hole" type="number" step="0.1" value="8.0"></div>
        <div class="row"><label>Max. dolžina antene<small>[mm]</small></label><input id="maxLen" type="number" step="0.1" value="30.0"></div>
        <div class="row"><label>Premer žice<small>[mm]</small></label><input id="wire" type="number" step="0.1" value="1.0"></div>
        <div class="row"><label>Material</label>
          <select id="material">
            <option value="1">Baker (Cu)</option>
            <option value="0.61">Aluminij (Al)</option>
            <option value="0.28">Medenina</option>
            <option value="0.10">Jeklo</option>
          </select>
        </div>

        <button onclick="calc()">IZRAČUNAJ</button>
      </div>

      <div class="warning" id="warning">Izračun je približek. Po izdelavi anteno uglasi z NanoVNA.</div>
    </div>

    <div>
      <div class="card svgbox">
        <div class="title">ŽIVA SVG SKICA</div>

<script>
const NS = "http://www.w3.org/2000/svg";

function txt(id, value) {
  const el = document.getElementById(id);
  if (el) el.textContent = value;
}

function fmt(x, d=1) { return Number(x).toFixed(d); }

function removeOldDynamicCoil() {
  const old = document.getElementById("dynamic_coil");
  if (old) old.remove();
}


function drawDynamicCoil(turns, outerMm, wireMm) {
  removeOldDynamicCoil();

  const template = document.getElementById("Coil");
  const templateEnd = document.getElementById("Coil_end");

  if (!template) {
    console.warn("Element #Coil ni najden.");
    return;
  }

  // Originalni Coil uporabimo kot šablono, zato ga skrijemo.
  template.style.display = "none";
  if (templateEnd) templateEnd.style.display = "none";

  const svg = document.querySelector(".svgbox svg");

  const g = document.createElementNS(NS, "g");
  g.setAttribute("id", "dynamic_coil");

  // Ciljni prostor v tvojem CorelDRAW koordinatnem sistemu.
  const x0 = 4700;
  const x1 = 22100;
  const cy = 13730;
  const targetWidth = x1 - x0;

  // Premer v mm prevedemo v vizualno višino na risbi.
  const targetHeight = Math.max(1050, Math.min(3100, outerMm * 370));

  // BBox dobimo iz tvojega originalnega Coil elementa.
  const b = template.getBBox();
  const centerY = b.y + b.height / 2;

  // Vsak tvoj Coil je uporabljen kot en navoj.
  const pitchSvg = targetWidth / turns;

  // Malo prekrivanja, da se navoji lepo stikajo.
  const sx = (pitchSvg * 1.10) / b.width;
  const sy = targetHeight / b.height;

  // Mehka senca pod anteno.
  const shadow = document.createElementNS(NS, "ellipse");
  shadow.setAttribute("cx", (x0 + x1) / 2);
  shadow.setAttribute("cy", cy + targetHeight / 2 + 240);
  shadow.setAttribute("rx", targetWidth / 2);
  shadow.setAttribute("ry", Math.max(80, targetHeight * 0.055));
  shadow.setAttribute("fill", "#000");
  shadow.setAttribute("opacity", "0.12");
  g.appendChild(shadow);

  for (let i = 0; i < turns; i++) {
    const c = template.cloneNode(true);
    c.removeAttribute("id");
    c.style.display = "inline";

    const x = x0 + i * pitchSvg;

    // Ključni del:
    // 1) prestavimo navoj na pravo mesto,
    // 2) ga skaliramo na korak,
    // 3) ga centriramo po višini.
    c.setAttribute(
      "transform",
      `translate(${x.toFixed(2)} ${cy.toFixed(2)}) scale(${sx.toFixed(5)} ${sy.toFixed(5)}) translate(${-b.x.toFixed(2)} ${-centerY.toFixed(2)})`
    );

    g.appendChild(c);
  }

  // Dodamo še tvoj originalni zaključek, če obstaja.
  if (templateEnd) {
    const e = templateEnd.cloneNode(true);
    e.removeAttribute("id");
    e.style.display = "inline";

    const eb = templateEnd.getBBox();
    const eCenterY = eb.y + eb.height / 2;
    const endScale = targetHeight / Math.max(1, eb.height);

    e.setAttribute(
      "transform",
      `translate(${(x1 + pitchSvg * 0.18).toFixed(2)} ${cy.toFixed(2)}) scale(${endScale.toFixed(5)} ${endScale.toFixed(5)}) translate(${-eb.x.toFixed(2)} ${-eCenterY.toFixed(2)})`
    );

    g.appendChild(e);
  }

  svg.appendChild(g);
}


function calc() {
  const C = 299792458;
  const freq = parseFloat(document.getElementById("freq").value);
  const hole = parseFloat(document.getElementById("hole").value);
  const maxLen = parseFloat(document.getElementById("maxLen").value);
  const wire = parseFloat(document.getElementById("wire").value);
  const material = parseFloat(document.getElementById("material").value);

  if (!freq || !hole || !maxLen || !wire || freq <= 0 || hole <= 0 || maxLen <= 0 || wire <= 0) {
    alert("Vnesi pozitivne številke.");
    return;
  }

  if (hole <= wire * 2) {
    document.getElementById("warning").innerHTML = "Luknja je premajhna za tako žico.";
    return;
  }

  const lambda = (C / (freq * 1e6)) * 1000;
  const quarter = lambda / 4;

  const clearance = Math.max(0.2, wire * 0.15);
  const outer = hole - 2 * clearance;
  const coilD = outer - wire;      // premer po sredini žice
  const circ = Math.PI * coilD;

  let pitch = maxLen / Math.sqrt(Math.pow(quarter / circ, 2) - 1);
  if (!isFinite(pitch) || pitch <= 0) pitch = wire * 1.05;
  pitch = Math.max(pitch, wire * 1.05);

  const turns = Math.max(1, Math.round(maxLen / pitch));
  const realPitch = maxLen / turns;
  const oneTurn = Math.sqrt(circ*circ + realPitch*realPitch);
  const wireLen = oneTurn * turns;
  const cutLen = wireLen + 8;
  const estFreq = freq * (quarter / wireLen);

  txt("length_text", fmt(maxLen, 1) + " mm");
  txt("diameter_text", fmt(outer, 1) + " mm");

  drawDynamicCoil(turns, outer, wire);

  txt("lambdaOut", fmt(lambda, 1) + " mm");
  txt("quarterOut", fmt(quarter, 1) + " mm");
  txt("turnsOut", String(turns));
  txt("pitchOut", fmt(realPitch, 1) + " mm");
  txt("cutOut", fmt(cutLen, 0) + " mm");
  txt("resOut", fmt(estFreq, 1) + " MHz");

  let w = "Izračun je približek. Po izdelavi anteno uglasi z NanoVNA.";
  if (maxLen < quarter * 0.35) w = "Antena je precej krajša od λ/4, zato bo učinkovitost nižja. Uglasi z NanoVNA.";
  if (material < 0.3) w += "<br>Material ima slabšo prevodnost; za 433 MHz je baker boljša izbira.";
  document.getElementById("warning").innerHTML = w;
}

calc();
</script>
